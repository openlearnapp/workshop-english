<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2a6e"/>
      <stop offset="100%" style="stop-color:#1a5cbb"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Union Jack stripes (subtle) -->
  <rect x="0" y="350" width="1280" height="100" fill="rgba(200,0,0,0.18)"/>
  <rect x="590" y="0" width="100" height="800" fill="rgba(200,0,0,0.18)"/>
  <line x1="0" y1="0" x2="1280" y2="800" stroke="rgba(200,0,0,0.10)" stroke-width="60"/>
  <line x1="1280" y1="0" x2="0" y2="800" stroke="rgba(200,0,0,0.10)" stroke-width="60"/>

  <!-- Overlay -->
  <rect width="1280" height="800" fill="rgba(0,0,0,0.30)"/>

  <!-- Center card -->
  <rect x="290" y="150" width="700" height="500" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Speech bubble icon -->
  <rect x="555" y="220" width="170" height="120" rx="20" fill="rgba(255,255,255,0.9)"/>
  <polygon points="590,340 620,340 605,375" fill="rgba(255,255,255,0.9)"/>
  <rect x="575" y="248" width="130" height="12" rx="6" fill="#1a5cbb"/>
  <rect x="575" y="272" width="100" height="12" rx="6" fill="#1a5cbb" opacity="0.6"/>
  <rect x="575" y="296" width="115" height="12" rx="6" fill="#1a5cbb" opacity="0.4"/>

  <!-- Main title -->
  <text x="640" y="460" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="bold"
        text-anchor="middle" fill="white" letter-spacing="3">Englisch</text>

  <!-- Subtitle -->
  <text x="640" y="520" font-family="Arial, Helvetica, sans-serif" font-size="28"
        text-anchor="middle" fill="rgba(255,255,255,0.75)" letter-spacing="2">English · Learn English</text>

  <!-- Divider -->
  <rect x="520" y="548" width="240" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Label -->
  <text x="640" y="590" font-family="Arial, Helvetica, sans-serif" font-size="22"
        text-anchor="middle" fill="rgba(255,255,255,0.5)" letter-spacing="3">10 LEKTIONEN · OPEN LEARN</text>
</svg>
