version: 2
number: 1
title: "افعال اساسی - بودن و داشتن"
description: "مهم‌ترین افعال to be و to have با تمام صورت‌هایشان"
sections:
  - title: "To be"
    explanation: |
      **To be** به معنی **بودن** است و مهم‌ترین فعل انگلیسی است:
      - هویت، ملیت، شغل
      - ویژگی‌ها و حالات
      - سن، زمان، آب و هوا

      **صرف زمان حال ساده**:
      - I am (من هستم)
      - you are (تو هستی / شما هستید)
      - he/she/it is (او هست)
      - we are (ما هستیم)
      - they are (آن‌ها هستند)

      **فرم‌های کوتاه**: I'm, you're, he's, she's, it's, we're, they're
    examples:
      - q: "I am a teacher."
        a: "من معلم هستم."
        labels: ["حال ساده", "اول شخص مفرد"]
        rel:
          - ["am", "هستم", "to be - من هستم"]
          - ["teacher", "معلم", "اسم - شغل"]

      - q: "You are very kind."
        a: "تو خیلی مهربان هستی."
        labels: ["حال ساده", "دوم شخص مفرد"]
        rel:
          - ["are", "هستی", "to be - تو هستی"]
          - ["kind", "مهربان", "صفت"]

      - q: "She is from Germany."
        a: "او از آلمان است."
        labels: ["حال ساده", "سوم شخص مفرد"]
        rel:
          - ["is", "است", "to be - او هست"]
          - ["from", "از", "حرف اضافه - مبدا"]

      - q: "We are students."
        a: "ما دانشجو هستیم."
        labels: ["حال ساده", "اول شخص جمع"]
        rel:
          - ["are", "هستیم", "to be - ما هستیم"]
          - ["students", "دانشجوها", "اسم - تحصیل"]

      - q: "They are happy today."
        a: "آن‌ها امروز خوشحال هستند."
        labels: ["حال ساده", "سوم شخص جمع"]
        rel:
          - ["are", "هستند", "to be - آن‌ها هستند"]
          - ["happy", "خوشحال", "صفت - احساس"]
          - ["today", "امروز", "قید زمان"]

      - q: "It is cold outside."
        a: "بیرون سرد است."
        labels: ["حال ساده", "آب و هوا"]
        rel:
          - ["is", "است", "to be - آن هست"]
          - ["cold", "سرد", "صفت - آب و هوا"]
          - ["outside", "بیرون", "قید مکان"]

      - q: "I'm not tired."
        a: "من خسته نیستم."
        labels: ["فرم کوتاه", "منفی"]
        rel:
          - ["I'm", "من هستم", "to be - فرم کوتاه"]
          - ["not", "نه/نیست", "منفی"]
          - ["tired", "خسته", "صفت - حالت"]

      - type: input
        q: "ترجمه کنید: ما خوشحال هستیم."
        a: ["We are happy.", "We're happy."]
        labels: ["حال ساده", "اول شخص جمع"]

      - type: select
        q: "کدام صورت درست است؟ He ___ a student."
        options:
          - text: "am"
          - text: "is"
            correct: true
          - text: "are"
        labels: ["حال ساده", "سوم شخص مفرد"]

  - title: "To have"
    explanation: |
      **To have** به معنی **داشتن** است:
      - مالکیت
      - روابط
      - ویژگی‌های فیزیکی
      - تجربیات (have + اسم مفعول = ماضی نقلی)

      **صرف زمان حال ساده**:
      - I have (من دارم)
      - you have (تو داری)
      - he/she/it has (او دارد)
      - we have (ما داریم)
      - they have (آن‌ها دارند)

      **توجه**: در سوم شخص مفرد از **has** استفاده می‌شود!
    examples:
      - q: "I have a car."
        a: "من یک ماشین دارم."
        labels: ["حال ساده", "اول شخص مفرد"]
        rel:
          - ["have", "دارم", "to have - من دارم"]
          - ["a car", "یک ماشین", "اسم - وسیله نقلیه"]

      - q: "You have two brothers."
        a: "تو دو برادر داری."
        labels: ["حال ساده", "دوم شخص مفرد"]
        rel:
          - ["have", "داری", "to have - تو داری"]
          - ["two", "دو", "عدد"]
          - ["brothers", "برادرها", "اسم - خانواده"]

      - q: "She has blue eyes."
        a: "او چشم‌های آبی دارد."
        labels: ["حال ساده", "سوم شخص مفرد"]
        rel:
          - ["has", "دارد", "to have - او دارد"]
          - ["blue", "آبی", "صفت - رنگ"]
          - ["eyes", "چشم‌ها", "اسم - بدن"]

      - q: "We have a big house."
        a: "ما یک خانه بزرگ داریم."
        labels: ["حال ساده", "اول شخص جمع"]
        rel:
          - ["have", "داریم", "to have - ما داریم"]
          - ["big", "بزرگ", "صفت"]
          - ["house", "خانه", "اسم - مسکن"]

      - q: "They have three children."
        a: "آن‌ها سه فرزند دارند."
        labels: ["حال ساده", "سوم شخص جمع"]
        rel:
          - ["have", "دارند", "to have - آن‌ها دارند"]
          - ["three", "سه", "عدد"]
          - ["children", "فرزندان", "اسم - خانواده"]

      - q: "He has a lot of money."
        a: "او پول زیادی دارد."
        labels: ["حال ساده", "سوم شخص مفرد"]
        rel:
          - ["has", "دارد", "to have - او دارد"]
          - ["a lot of", "زیاد", "مقدار"]
          - ["money", "پول", "اسم"]

      - q: "I don't have time."
        a: "من وقت ندارم."
        labels: ["منفی"]
        rel:
          - ["don't have", "ندارم", "to have - منفی"]
          - ["time", "وقت/زمان", "اسم"]

      - type: input
        q: "ترجمه کنید: او چشم‌های آبی دارد."
        a: "She has blue eyes."
        labels: ["حال ساده", "سوم شخص مفرد"]

      - type: select
        q: "کدام صورت برای سوم شخص مفرد درست است؟"
        options:
          - text: "has"
            correct: true
          - text: "have"
        labels: ["حال ساده", "سوم شخص مفرد"]

  - title: "To be در مقابل To have"
    explanation: |
      **تفاوت مهم با فارسی**:
      در انگلیسی می‌گوییم:
      - **I am** 25 years old (من ۲۵ ساله **هستم**)
      - **I am** hungry (من گرسنه **هستم** - در فارسی هم از بودن استفاده می‌شود)
      - **I am** cold (من سردم **است** - من احساس سرما می‌کنم)

      در بعضی زبان‌ها از **داشتن** استفاده می‌شود جایی که انگلیسی از **to be** استفاده می‌کند!
    examples:
      - q: "I am 30 years old."
        a: "من ۳۰ ساله هستم."
        labels: ["to be", "سن"]
        rel:
          - ["am", "هستم", "to be - سن"]
          - ["years old", "ساله", "عبارت - سن"]

      - q: "She is hungry."
        a: "او گرسنه است."
        labels: ["to be", "حالت"]
        rel:
          - ["hungry", "گرسنه", "صفت - نیاز"]

      - q: "We are thirsty."
        a: "ما تشنه هستیم."
        labels: ["to be", "حالت"]
        rel:
          - ["thirsty", "تشنه", "صفت - نیاز"]

      - q: "He is afraid of dogs."
        a: "او از سگ‌ها می‌ترسد."
        labels: ["to be", "احساس"]
        rel:
          - ["afraid of", "ترسیدن از", "عبارت"]
          - ["dogs", "سگ‌ها", "اسم - حیوان"]

      - q: "Are you cold?"
        a: "آیا سردت است؟"
        labels: ["to be", "سوال"]
        rel:
          - ["cold", "سرد", "صفت - احساس"]

      - q: "I have a headache."
        a: "من سردرد دارم."
        labels: ["to have", "سلامت"]
        rel:
          - ["have", "دارم", "to have - مالکیت"]
          - ["headache", "سردرد", "اسم - سلامت"]

      - type: input
        q: "ترجمه کنید: من ۲۵ ساله هستم."
        a: ["I am 25 years old.", "I'm 25 years old."]
        labels: ["to be", "سن"]
