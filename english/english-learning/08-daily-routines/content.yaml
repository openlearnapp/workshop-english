version: 2
number: 8
title: "Daily Verbs - Eat, Drink, Sleep"
description: "The verbs to eat, to drink, and to sleep with examples"
sections:
  - title: "To eat"
    explanation: |
      **To eat** means **essen** (to consume food):
      - Having meals
      - Consuming food

      **Conjugation**:
      - I eat, you eat, he/she/it **eats**, we eat, they eat
      - **Past tense**: ate
      - **Past participle**: eaten

      **Meals**:
      - breakfast = Frühstück
      - lunch = Mittagessen
      - dinner/supper = Abendessen
    examples:
      - q: "I eat breakfast at seven."
        a: "Ich frühstücke um sieben."
        labels: ["Simple Present", "Routine"]
        rel:
          - ["eat", "esse", "to eat"]
          - ["breakfast", "Frühstück", "Noun - meal"]
          - ["at seven", "um sieben", "Time"]

      - q: "She eats a lot of vegetables."
        a: "Sie isst viel Gemüse."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["eats", "isst", "to eat - he/she eats"]
          - ["a lot of", "viel", "Quantity"]
          - ["vegetables", "Gemüse", "Noun - food"]

      - q: "We ate pizza last night."
        a: "Wir haben gestern Abend Pizza gegessen."
        labels: ["Past tense"]
        rel:
          - ["ate", "aßen/haben gegessen", "to eat - past tense"]
          - ["last night", "gestern Abend", "Time expression"]

      - q: "What do you want to eat?"
        a: "Was willst du essen?"
        labels: ["Question"]
        rel:
          - ["want to eat", "essen wollen", "Expression"]

      - q: "I don't eat meat."
        a: "Ich esse kein Fleisch."
        labels: ["Negation"]
        rel:
          - ["don't eat", "esse nicht", "Negation"]
          - ["meat", "Fleisch", "Noun - food"]

      - q: "Have you eaten yet?"
        a: "Hast du schon gegessen?"
        labels: ["Question", "Present perfect"]
        rel:
          - ["have you eaten", "hast du gegessen", "Question - present perfect"]
          - ["yet", "schon/noch", "Adverb"]

      - type: input
        q: "Translate: I don't eat meat."
        a: "I don't eat meat."
        labels: ["Translation", "Negation"]
        rel:
          - ["don't eat", "esse nicht", "Negation"]
          - ["meat", "Fleisch", "Noun - food"]

      - type: select
        q: "Which past tense form is correct? We ___ pizza last night."
        options:
          - text: "eated"
          - text: "eat"
          - text: "ate"
            correct: true
        labels: ["Past tense", "Irregular verb"]

  - title: "To drink"
    explanation: |
      **To drink** means **trinken** (to consume liquids):
      - Consuming liquids
      - Also: drinking alcohol

      **Conjugation**:
      - I drink, you drink, he/she/it **drinks**, we drink, they drink
      - **Past tense**: drank
      - **Past participle**: drunk

      **Beverages**:
      - water = Wasser
      - coffee = Kaffee
      - tea = Tee
      - juice = Saft
      - beer = Bier
      - wine = Wein
    examples:
      - q: "I drink coffee every morning."
        a: "Ich trinke jeden Morgen Kaffee."
        labels: ["Simple Present", "Routine"]
        rel:
          - ["drink", "trinke", "to drink"]
          - ["coffee", "Kaffee", "Noun - drink"]
          - ["every morning", "jeden Morgen", "Time expression"]

      - q: "She drinks a lot of water."
        a: "Sie trinkt viel Wasser."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["drinks", "trinkt", "to drink - he/she drinks"]
          - ["water", "Wasser", "Noun - drink"]

      - q: "What would you like to drink?"
        a: "Was möchten Sie trinken?"
        labels: ["Question", "Politeness"]
        rel:
          - ["would you like to drink", "möchten Sie trinken", "Polite question"]

      - q: "I don't drink alcohol."
        a: "Ich trinke keinen Alkohol."
        labels: ["Negation"]
        rel:
          - ["don't drink", "trinke nicht", "Negation"]
          - ["alcohol", "Alkohol", "Noun"]

      - q: "We drank too much last night."
        a: "Wir haben gestern Abend zu viel getrunken."
        labels: ["Past tense"]
        rel:
          - ["drank", "tranken", "to drink - past tense"]
          - ["too much", "zu viel", "Quantity"]

      - type: input
        q: "Translate: What would you like to drink?"
        a: "What would you like to drink?"
        labels: ["Translation", "Politeness"]
        rel:
          - ["would you like to drink", "möchten Sie trinken", "Polite question"]

  - title: "To sleep"
    explanation: |
      **To sleep** means **schlafen** (to rest):
      - Night sleep
      - Nap (take a nap)
      - Related expressions: wake up, get up, go to bed

      **Conjugation**:
      - I sleep, you sleep, he/she/it **sleeps**, we sleep, they sleep
      - **Past tense**: slept

      **Useful expressions**:
      - go to bed = ins Bett gehen
      - fall asleep = einschlafen
      - wake up = aufwachen
      - get up = aufstehen
    examples:
      - q: "I sleep eight hours a night."
        a: "Ich schlafe acht Stunden pro Nacht."
        labels: ["Simple Present", "Routine"]
        rel:
          - ["sleep", "schlafe", "to sleep"]
          - ["eight hours", "acht Stunden", "Time expression"]
          - ["a night", "pro Nacht", "Time expression"]

      - q: "She slept until noon."
        a: "Sie hat bis Mittag geschlafen."
        labels: ["Past tense"]
        rel:
          - ["slept", "schlief/hat geschlafen", "to sleep - past tense"]
          - ["until noon", "bis Mittag", "Time expression"]

      - q: "I can't sleep when it's noisy."
        a: "Ich kann nicht schlafen, wenn es laut ist."
        labels: ["Negation"]
        rel:
          - ["can't sleep", "kann nicht schlafen", "Negation"]
          - ["noisy", "laut", "Adjective"]

      - q: "I go to bed at eleven."
        a: "Ich gehe um elf ins Bett."
        labels: ["Expression", "Routine"]
        rel:
          - ["go to bed", "ins Bett gehen", "Expression"]
          - ["at eleven", "um elf", "Time"]

      - q: "He wakes up at six every day."
        a: "Er wacht jeden Tag um sechs auf."
        labels: ["Expression", "Routine"]
        rel:
          - ["wakes up", "wacht auf", "Phrasal verb"]
          - ["at six", "um sechs", "Time"]

      - q: "The baby fell asleep in my arms."
        a: "Das Baby ist in meinen Armen eingeschlafen."
        labels: ["Past tense", "Expression"]
        rel:
          - ["fell asleep", "ist eingeschlafen", "Expression - past tense"]
          - ["baby", "Baby", "Noun"]
          - ["arms", "Arme", "Noun - body"]

      - type: multiple-choice
        q: "Which expressions mean 'wake up' or 'get up'?"
        options:
          - text: "wake up"
            correct: true
          - text: "fall asleep"
          - text: "get up"
            correct: true
          - text: "go to bed"
        labels: ["Vocabulary", "Phrasal verbs"]
