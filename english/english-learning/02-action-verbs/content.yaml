version: 2
number: 2
title: "Action Verbs - Go, Come, Do"
description: "The verbs to go, to come, and to do/make with examples"
sections:
  - title: "To go"
    explanation: |
      **To go** means **gehen/fahren** (to move away):
      - Movement away from a place
      - Future plans (going to + infinitive)
      - Often with prepositions (to, into, out)

      **Conjugation Present Tense**:
      - I go
      - you go
      - he/she/it goes
      - we go
      - they go

      **Note**: 3rd person singular: go**es** (not just -s!)
    examples:
      - q: "I go to school every day."
        a: "Ich gehe jeden Tag zur Schule."
        labels: ["Simple Present", "1st Person Singular"]
        rel:
          - ["go", "gehe", "to go - I go"]
          - ["to school", "zur Schule", "Place - education"]
          - ["every day", "jeden Tag", "Time expression"]

      - q: "She goes to work by bus."
        a: "Sie fährt mit dem Bus zur Arbeit."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["goes", "fährt", "to go - he/she goes"]
          - ["to work", "zur Arbeit", "Place - work"]
          - ["by bus", "mit dem Bus", "Transport"]

      - q: "We go shopping on Saturdays."
        a: "Wir gehen samstags einkaufen."
        labels: ["Simple Present", "1st Person Plural"]
        rel:
          - ["go shopping", "einkaufen gehen", "Expression"]
          - ["on Saturdays", "samstags", "Time expression"]

      - q: "They go to the cinema tonight."
        a: "Sie gehen heute Abend ins Kino."
        labels: ["Simple Present", "3rd Person Plural"]
        rel:
          - ["go", "gehen", "to go - they go"]
          - ["cinema", "Kino", "Noun - entertainment"]
          - ["tonight", "heute Abend", "Time expression"]

      - q: "Do you go to the gym?"
        a: "Gehst du ins Fitnessstudio?"
        labels: ["Question"]
        rel:
          - ["do you go", "gehst du", "Question with do"]
          - ["gym", "Fitnessstudio", "Noun - sports"]

      - q: "Let's go home."
        a: "Lass uns nach Hause gehen."
        labels: ["Imperative"]
        rel:
          - ["let's go", "lass uns gehen", "Suggestion"]
          - ["home", "nach Hause", "Place"]

      - type: input
        q: "Translate: She goes to school."
        a: "She goes to school."
        labels: ["Simple Present", "3rd Person Singular"]

  - title: "To come"
    explanation: |
      **To come** means **kommen** (to move toward):
      - Movement toward the speaker
      - Origin (come from)
      - Often the opposite of "to go"

      **Conjugation Present Tense**:
      - I come
      - you come
      - he/she/it comes
      - we come
      - they come
    examples:
      - q: "I come from Germany."
        a: "Ich komme aus Deutschland."
        labels: ["Simple Present", "Origin"]
        rel:
          - ["come from", "kommen aus", "Expression - origin"]
          - ["Germany", "Deutschland", "Country"]

      - q: "She comes home at six."
        a: "Sie kommt um sechs nach Hause."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["comes", "kommt", "to come - he/she comes"]
          - ["at six", "um sechs", "Time"]
          - ["home", "nach Hause", "Place"]

      - q: "Can you come to my party?"
        a: "Kannst du zu meiner Party kommen?"
        labels: ["Question", "Invitation"]
        rel:
          - ["can you come", "kannst du kommen", "Question"]
          - ["party", "Party/Feier", "Noun"]

      - q: "They come here every summer."
        a: "Sie kommen jeden Sommer hierher."
        labels: ["Simple Present", "3rd Person Plural"]
        rel:
          - ["come", "kommen", "to come - they come"]
          - ["here", "hierher", "Place"]
          - ["every summer", "jeden Sommer", "Time expression"]

      - q: "Come in, please!"
        a: "Kommen Sie herein, bitte!"
        labels: ["Imperative", "Politeness"]
        rel:
          - ["come in", "hereinkommen", "Phrasal verb"]
          - ["please", "bitte", "Polite word"]

      - q: "Where do you come from?"
        a: "Woher kommst du?"
        labels: ["Question", "Origin"]
        rel:
          - ["where", "woher/wo", "Question word"]
          - ["come from", "kommen aus", "Expression"]

      - type: input
        q: "Translate: Where do you come from?"
        a: ["Where do you come from?", "Where are you from?"]
        labels: ["Question", "Origin"]

  - title: "To do / To make"
    explanation: |
      **To do** and **to make** both mean **machen/tun**, but:
      - **To do**: Activities, tasks, work
        - do homework, do the dishes, do exercise
      - **To make**: Creating, producing something
        - make breakfast, make a cake, make a decision

      **To do - Conjugation**:
      - I do, you do, he/she/it **does**, we do, they do

      **To make - Conjugation**:
      - I make, you make, he/she/it **makes**, we make, they make
    examples:
      - q: "I do my homework after school."
        a: "Ich mache meine Hausaufgaben nach der Schule."
        labels: ["Simple Present", "to do"]
        rel:
          - ["do", "mache", "to do - I do"]
          - ["homework", "Hausaufgaben", "Noun - school"]
          - ["after school", "nach der Schule", "Time expression"]

      - q: "She does the dishes every evening."
        a: "Sie spült jeden Abend ab."
        labels: ["Simple Present", "to do", "3rd Person Singular"]
        rel:
          - ["does", "macht", "to do - he/she does"]
          - ["the dishes", "den Abwasch", "Noun - household"]
          - ["every evening", "jeden Abend", "Time expression"]

      - q: "He makes breakfast for the family."
        a: "Er macht Frühstück für die Familie."
        labels: ["Simple Present", "to make", "3rd Person Singular"]
        rel:
          - ["makes", "macht", "to make - he/she makes"]
          - ["breakfast", "Frühstück", "Noun - meal"]
          - ["family", "Familie", "Noun"]

      - q: "We make plans for the weekend."
        a: "Wir machen Pläne fürs Wochenende."
        labels: ["Simple Present", "to make"]
        rel:
          - ["make plans", "Pläne machen", "Expression"]
          - ["weekend", "Wochenende", "Time expression"]

      - q: "What do you do for a living?"
        a: "Was machst du beruflich?"
        labels: ["Question", "to do"]
        rel:
          - ["what do you do", "was machst du", "Question"]
          - ["for a living", "beruflich", "Expression"]

      - q: "Don't make noise!"
        a: "Mach keinen Lärm!"
        labels: ["Imperative", "Negation", "to make"]
        rel:
          - ["don't make", "mach nicht", "Negation - imperative"]
          - ["noise", "Lärm", "Noun"]

      - type: select
        q: "Which verb fits? ___ breakfast"
        options:
          - text: "do"
          - text: "make"
            correct: true
          - text: "take"
        labels: ["to make", "Collocation"]

  - title: "Going to - Near Future"
    explanation: |
      **Going to + infinitive** expresses the **near future**:
      - Plans and intentions
      - What you intend to do
      - Similar to German "ich werde..."

      **Structure**: Subject + am/is/are + going to + verb
    examples:
      - q: "I am going to cook dinner."
        a: "Ich werde das Abendessen kochen."
        labels: ["Future", "going to"]
        rel:
          - ["going to cook", "werde kochen", "Future"]
          - ["dinner", "Abendessen", "Noun - meal"]

      - q: "She is going to visit her parents."
        a: "Sie wird ihre Eltern besuchen."
        labels: ["Future", "going to"]
        rel:
          - ["going to visit", "wird besuchen", "Future"]
          - ["parents", "Eltern", "Noun - family"]

      - q: "We are going to travel next month."
        a: "Wir werden nächsten Monat reisen."
        labels: ["Future", "going to"]
        rel:
          - ["going to travel", "werden reisen", "Future"]
          - ["next month", "nächsten Monat", "Time expression"]

      - q: "Are you going to come to the party?"
        a: "Wirst du zur Party kommen?"
        labels: ["Future", "Question"]
        rel:
          - ["are you going to", "wirst du", "Question - future"]
          - ["party", "Party", "Noun"]

      - q: "They are going to buy a new house."
        a: "Sie werden ein neues Haus kaufen."
        labels: ["Future", "going to"]
        rel:
          - ["going to buy", "werden kaufen", "Future"]
          - ["new", "neu", "Adjective"]
          - ["house", "Haus", "Noun"]

      - type: input
        q: "Translate: I am going to cook."
        a: ["I am going to cook.", "I'm going to cook."]
        labels: ["Future", "going to"]
