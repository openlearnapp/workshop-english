version: 2
number: 6
title: "Desires and Preferences - Want, Like, Need"
description: "The verbs to want, to like, and to need with examples"
sections:
  - title: "To want"
    explanation: |
      **To want** means **wollen/möchten** (to desire):
      - Expressing wishes
      - Wanting to have something
      - Often with infinitive (want to + verb)

      **Conjugation**:
      - I want, you want, he/she/it **wants**, we want, they want

      **Tip**: "Would like" is more polite than "want":
      - I want coffee (direct)
      - I would like coffee / I'd like coffee (polite)
    examples:
      - q: "I want a cup of coffee."
        a: "Ich möchte eine Tasse Kaffee."
        labels: ["Simple Present"]
        rel:
          - ["want", "möchte/will", "to want"]
          - ["a cup of", "eine Tasse", "Quantity"]
          - ["coffee", "Kaffee", "Noun - drink"]

      - q: "She wants to go home."
        a: "Sie will nach Hause gehen."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["wants to", "will", "to want + infinitive"]
          - ["go home", "nach Hause gehen", "Expression"]

      - q: "What do you want for dinner?"
        a: "Was willst du zum Abendessen?"
        labels: ["Question"]
        rel:
          - ["what do you want", "was willst du", "Question"]
          - ["for dinner", "zum Abendessen", "Meal"]

      - q: "I don't want to be late."
        a: "Ich will nicht zu spät kommen."
        labels: ["Negation"]
        rel:
          - ["don't want to", "will nicht", "Negation"]
          - ["be late", "zu spät kommen", "Expression"]
          - ["late", "spät", "Adjective"]

      - q: "I'd like a glass of water, please."
        a: "Ich hätte gerne ein Glas Wasser, bitte."
        labels: ["Politeness", "would like"]
        rel:
          - ["I'd like", "ich hätte gerne", "Polite form of want"]
          - ["a glass of", "ein Glas", "Quantity"]
          - ["water", "Wasser", "Noun - drink"]

      - q: "Do you want to come with us?"
        a: "Willst du mit uns kommen?"
        labels: ["Question", "Invitation"]
        rel:
          - ["want to come", "kommen wollen", "Expression"]
          - ["with us", "mit uns", "Pronoun"]

      - type: input
        q: "Translate: I want a cup of coffee."
        a: ["I want a cup of coffee.", "I'd like a cup of coffee."]
        labels: ["Translation"]
        rel:
          - ["want", "möchte/will", "to want"]
          - ["a cup of coffee", "eine Tasse Kaffee", "Expression"]

  - title: "To like"
    explanation: |
      **To like** means **mögen/gern haben** (to enjoy):
      - Expressing preferences
      - Like + noun (I like coffee)
      - Like + gerund (I like swimming)
      - Like + infinitive (I like to swim)

      **Conjugation**:
      - I like, you like, he/she/it **likes**, we like, they like

      **Gradation**: like < love < adore
    examples:
      - q: "I like chocolate."
        a: "Ich mag Schokolade."
        labels: ["Simple Present"]
        rel:
          - ["like", "mag", "to like"]
          - ["chocolate", "Schokolade", "Noun - food"]

      - q: "She likes reading books."
        a: "Sie liest gerne Bücher."
        labels: ["Simple Present", "Gerund"]
        rel:
          - ["likes reading", "liest gerne", "like + gerund"]
          - ["books", "Bücher", "Noun"]

      - q: "Do you like your new job?"
        a: "Magst du deinen neuen Job?"
        labels: ["Question"]
        rel:
          - ["do you like", "magst du", "Question"]
          - ["new", "neu", "Adjective"]
          - ["job", "Job/Arbeit", "Noun - work"]

      - q: "I don't like getting up early."
        a: "Ich stehe nicht gern früh auf."
        labels: ["Negation", "Gerund"]
        rel:
          - ["don't like", "mag nicht", "Negation"]
          - ["getting up", "aufstehen", "Phrasal verb"]
          - ["early", "früh", "Adverb"]

      - q: "He likes playing football."
        a: "Er spielt gerne Fußball."
        labels: ["Simple Present", "Gerund"]
        rel:
          - ["likes playing", "spielt gerne", "like + gerund"]
          - ["football", "Fußball", "Noun - sports"]

      - q: "Would you like some tea?"
        a: "Möchtest du etwas Tee?"
        labels: ["Politeness", "Offer"]
        rel:
          - ["would you like", "möchtest du", "Polite question"]
          - ["some", "etwas", "Quantity"]
          - ["tea", "Tee", "Noun - drink"]

      - type: select
        q: "Which sentence is correct?"
        options:
          - text: "She likes reading"
            correct: true
          - text: "She likes read"
          - text: "She like reading"
        labels: ["Grammar", "Gerund"]

  - title: "To need"
    explanation: |
      **To need** means **brauchen/benötigen** (to require):
      - Expressing necessity
      - Need + noun (I need help)
      - Need + infinitive (I need to go)

      **Conjugation**:
      - I need, you need, he/she/it **needs**, we need, they need

      **Difference**: want = want (wish), need = need (necessity)
    examples:
      - q: "I need your help."
        a: "Ich brauche deine Hilfe."
        labels: ["Simple Present"]
        rel:
          - ["need", "brauche", "to need"]
          - ["help", "Hilfe", "Noun"]

      - q: "She needs more time."
        a: "Sie braucht mehr Zeit."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["needs", "braucht", "to need - he/she needs"]
          - ["more", "mehr", "Adverb"]
          - ["time", "Zeit", "Noun"]

      - q: "You need to be careful."
        a: "Du musst vorsichtig sein."
        labels: ["Warning"]
        rel:
          - ["need to be", "muss sein", "Necessity"]
          - ["careful", "vorsichtig", "Adjective"]

      - q: "I don't need anything."
        a: "Ich brauche nichts."
        labels: ["Negation"]
        rel:
          - ["don't need", "brauche nicht", "Negation"]
          - ["anything", "irgendetwas/nichts", "Pronoun"]

      - q: "What do you need?"
        a: "Was brauchst du?"
        labels: ["Question"]
        rel:
          - ["what do you need", "was brauchst du", "Question"]

      - q: "We need to talk."
        a: "Wir müssen reden."
        labels: ["Expression"]
        rel:
          - ["need to talk", "müssen reden", "Expression"]
          - ["talk", "reden", "Verb"]

      - type: input
        q: "Translate: I need your help."
        a: "I need your help."
        labels: ["Translation"]
        rel:
          - ["need", "brauche", "to need"]
          - ["your help", "deine Hilfe", "Expression"]

  - title: "Expressions with Want, Like, Need"
    explanation: |
      **Common expressions**:
      - I'd love to = I would very much like to
      - feel like = to be in the mood for
      - if you like = if you want
      - as you like = as you wish
    examples:
      - q: "I'd love to come to your party."
        a: "Ich würde sehr gerne zu deiner Party kommen."
        labels: ["Expression", "Politeness"]
        rel:
          - ["I'd love to", "ich würde sehr gerne", "Expression"]

      - q: "I feel like eating pizza."
        a: "Ich habe Lust auf Pizza."
        labels: ["Expression"]
        rel:
          - ["feel like", "Lust haben auf", "Expression"]
          - ["pizza", "Pizza", "Noun - food"]

      - q: "You can stay if you like."
        a: "Du kannst bleiben, wenn du magst."
        labels: ["Expression", "Offer"]
        rel:
          - ["if you like", "wenn du magst", "Expression"]
          - ["stay", "bleiben", "Verb"]

      - q: "All I need is love."
        a: "Alles, was ich brauche, ist Liebe."
        labels: ["Expression"]
        rel:
          - ["all I need", "alles was ich brauche", "Expression"]
          - ["love", "Liebe", "Noun"]

      - type: input
        q: "Translate: I feel like eating pizza."
        a: "I feel like eating pizza."
        labels: ["Translation", "Expression"]
        rel:
          - ["feel like", "Lust haben auf", "Expression"]
