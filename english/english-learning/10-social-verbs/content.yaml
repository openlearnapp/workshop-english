version: 2
number: 10
title: "Social Verbs - Give, Take, Help"
description: "The verbs to give, to take, and to help with examples"
sections:
  - title: "To give"
    explanation: |
      **To give** means **geben** (to hand over):
      - Handing something over
      - Giving as a gift
      - Providing information

      **Conjugation**:
      - I give, you give, he/she/it **gives**, we give, they give
      - **Past tense**: gave
      - **Past participle**: given

      **Structure**: give + person + thing (give me the book)
      or: give + thing + to + person (give the book to me)
    examples:
      - q: "Give me the book, please."
        a: "Gib mir das Buch, bitte."
        labels: ["Imperative"]
        rel:
          - ["give", "gib", "to give - imperative"]
          - ["book", "Buch", "Noun"]

      - q: "She gives her mother flowers every Sunday."
        a: "Sie schenkt ihrer Mutter jeden Sonntag Blumen."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["gives", "schenkt", "to give - he/she gives"]
          - ["mother", "Mutter", "Noun - family"]
          - ["flowers", "Blumen", "Noun - nature"]

      - q: "He gave me good advice."
        a: "Er hat mir einen guten Rat gegeben."
        labels: ["Past tense"]
        rel:
          - ["gave", "gab", "to give - past tense"]
          - ["advice", "Rat/Ratschlag", "Noun"]

      - q: "Can you give me a hand?"
        a: "Kannst du mir helfen?"
        labels: ["Question", "Expression"]
        rel:
          - ["give me a hand", "mir helfen", "Idiom"]

      - q: "I'll give you a call later."
        a: "Ich rufe dich später an."
        labels: ["Expression", "Future"]
        rel:
          - ["give you a call", "dich anrufen", "Idiom"]
          - ["later", "später", "Time expression"]

      - q: "Don't give up!"
        a: "Gib nicht auf!"
        labels: ["Imperative", "Expression"]
        rel:
          - ["give up", "aufgeben", "Phrasal verb"]

      - type: input
        q: "Translate: Don't give up!"
        a: "Don't give up!"
        labels: ["Translation", "Phrasal verb"]
        rel:
          - ["give up", "aufgeben", "Phrasal verb"]

  - title: "To take"
    explanation: |
      **To take** means **nehmen** (to grab, to use):
      - Taking / bringing something
      - Requiring (it takes time)
      - Using transport (take the bus)

      **Conjugation**:
      - I take, you take, he/she/it **takes**, we take, they take
      - **Past tense**: took
      - **Past participle**: taken

      **Common expressions**:
      - take a photo = take a picture
      - take a break = have a break
      - take care = take care of yourself
      - it takes = it requires (time)
    examples:
      - q: "Take your umbrella, it's going to rain."
        a: "Nimm deinen Regenschirm, es wird regnen."
        labels: ["Imperative"]
        rel:
          - ["take", "nimm", "to take - imperative"]
          - ["umbrella", "Regenschirm", "Noun"]
          - ["rain", "regnen", "Verb - weather"]

      - q: "She takes the bus to work."
        a: "Sie nimmt den Bus zur Arbeit."
        labels: ["Simple Present", "Transport"]
        rel:
          - ["takes", "nimmt", "to take - he/she takes"]
          - ["bus", "Bus", "Noun - transport"]

      - q: "It takes thirty minutes to get there."
        a: "Es dauert dreißig Minuten, um dorthin zu kommen."
        labels: ["Expression", "Duration"]
        rel:
          - ["it takes", "es dauert", "Expression - duration"]
          - ["thirty minutes", "dreißig Minuten", "Time expression"]

      - q: "Can I take a photo?"
        a: "Darf ich ein Foto machen?"
        labels: ["Question", "Expression"]
        rel:
          - ["take a photo", "ein Foto machen", "Expression"]

      - q: "Let's take a break."
        a: "Lass uns eine Pause machen."
        labels: ["Expression"]
        rel:
          - ["take a break", "eine Pause machen", "Expression"]
          - ["break", "Pause", "Noun"]

      - q: "He took my advice."
        a: "Er hat meinen Rat befolgt."
        labels: ["Past tense"]
        rel:
          - ["took", "nahm an/befolgte", "to take - past tense"]
          - ["advice", "Rat", "Noun"]

      - q: "Take care!"
        a: "Pass auf dich auf! / Mach's gut!"
        labels: ["Expression", "Farewell"]
        rel:
          - ["take care", "pass auf dich auf", "Idiom"]

      - type: select
        q: "What does 'It takes 30 minutes' mean?"
        options:
          - text: "It takes 30 minutes away"
          - text: "It needs 30 minutes"
          - text: "It lasts 30 minutes"
            correct: true
        labels: ["Meaning", "Expression"]

  - title: "To help"
    explanation: |
      **To help** means **helfen** (to assist):
      - Providing support
      - Assisting

      **Conjugation**:
      - I help, you help, he/she/it **helps**, we help, they help
      - **Past tense**: helped

      **Structures**:
      - help + person + verb (help me carry this)
      - help + person + with (help me with my homework)
      - can't help = can't avoid (can't help laughing)
    examples:
      - q: "Can you help me?"
        a: "Kannst du mir helfen?"
        labels: ["Question"]
        rel:
          - ["help", "helfen", "to help"]
          - ["me", "mir", "Pronoun"]

      - q: "She helps her children with homework."
        a: "Sie hilft ihren Kindern bei den Hausaufgaben."
        labels: ["Simple Present", "3rd Person Singular"]
        rel:
          - ["helps", "hilft", "to help - he/she helps"]
          - ["children", "Kinder", "Noun - family"]
          - ["homework", "Hausaufgaben", "Noun - school"]

      - q: "He helped me carry the boxes."
        a: "Er hat mir geholfen, die Kisten zu tragen."
        labels: ["Past tense"]
        rel:
          - ["helped", "half/hat geholfen", "to help - past tense"]
          - ["carry", "tragen", "Verb"]
          - ["boxes", "Kisten", "Noun"]

      - q: "I can't help it."
        a: "Ich kann nichts dafür."
        labels: ["Expression"]
        rel:
          - ["can't help it", "kann nichts dafür", "Idiom"]

      - q: "Let me help you with that."
        a: "Lass mich dir dabei helfen."
        labels: ["Offer"]
        rel:
          - ["let me help", "lass mich helfen", "Offer"]
          - ["with that", "dabei", "Expression"]

      - q: "Thank you for helping me."
        a: "Danke, dass du mir geholfen hast."
        labels: ["Gratitude"]
        rel:
          - ["thank you for", "danke für", "Expression - gratitude"]
          - ["helping", "helfen", "to help - gerund"]

      - type: input
        q: "Translate: Can you help me?"
        a: "Can you help me?"
        labels: ["Translation", "Question"]
        rel:
          - ["help", "helfen", "to help"]

  - title: "Expressions with Give, Take, Help"
    explanation: |
      **Common idioms**:
      - give it a try = try it out
      - take it easy = relax, don't stress
      - help yourself = serve yourself
      - give and take = compromise
    examples:
      - q: "Give it a try!"
        a: "Versuch es einfach!"
        labels: ["Idiom"]
        rel:
          - ["give it a try", "es versuchen", "Idiom"]

      - q: "Take it easy!"
        a: "Immer mit der Ruhe! / Mach dir keinen Stress!"
        labels: ["Idiom"]
        rel:
          - ["take it easy", "locker bleiben", "Idiom"]

      - q: "Help yourself to some cake."
        a: "Bedien dich, nimm dir Kuchen."
        labels: ["Idiom", "Offer"]
        rel:
          - ["help yourself", "bedien dich", "Idiom"]
          - ["cake", "Kuchen", "Noun - food"]

      - q: "A good relationship is about give and take."
        a: "Eine gute Beziehung basiert auf Geben und Nehmen."
        labels: ["Idiom"]
        rel:
          - ["give and take", "Geben und Nehmen", "Idiom"]
          - ["relationship", "Beziehung", "Noun"]

      - q: "I can't help laughing."
        a: "Ich kann nicht anders, als zu lachen."
        labels: ["Expression"]
        rel:
          - ["can't help laughing", "kann nicht anders als zu lachen", "Expression"]
          - ["laughing", "lachen", "Verb - gerund"]

      - type: input
        q: "Translate: Take it easy!"
        a: "Take it easy!"
        labels: ["Translation", "Idiom"]
        rel:
          - ["take it easy", "locker bleiben", "Idiom"]
